# MSGIFSR — smoke test (dùng data/toy_link)
# python MSGIFSR/main.py --run msgifsr_toy.yaml
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: MSGIFSR/toy/MSGIFSR_toy.log

data:
  data_dir: data/toy_link
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

msgifsr:
  dataset_name: toy_msgifsr
  reuse_converted: false

msgifsr_model:
  embedding_dim: 64
  num_layers: 1
  order: 1
  feat_drop: 0.1
  reducer: mean
  norm: true
  extra: true
  fusion: true

msgifsr_training:
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  max_epochs: 3
  patience: 2
  seed: 42
  device: auto
  num_workers: 0
  log_interval: 50
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/MSGIFSR/toy"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
