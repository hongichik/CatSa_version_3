# MSGIFSR trên RetailRocket item_hon_5 (cùng bộ dữ liệu CatSA)
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: MSGIFSR/main/MSGIFSR_retailrocket.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

msgifsr:
  dataset_name: retailrocket_item_hon_5
  reuse_converted: true

msgifsr_model:
  embedding_dim: 256
  num_layers: 1
  order: 1
  feat_drop: 0.1
  reducer: mean
  norm: true
  extra: true
  fusion: true

msgifsr_training:
  batch_size: 512
  learning_rate: 0.001
  weight_decay: 0.0001
  max_epochs: 30
  patience: 3
  seed: 42
  device: auto
  num_workers: 0
  log_interval: 200
  lr_step_size: 3
  lr_gamma: 0.1
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/MSGIFSR/retailrocket/msgifsr"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
