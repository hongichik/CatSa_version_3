# CatSA++ v3 — "bản A": giữ đóng góp category, thêm 2 cơ chế mới:
#
# 1. use_cat_intent (M2TRec/MCGNN-style): TRM nhỏ encode chuỗi CATEGORY của
#    prefix → dự đoán phân phối category kế tiếp → cộng logit vào item thuộc
#    category tương ứng. Category tham gia TRỰC TIẾP vào ranking tại
#    inference (mạnh hơn aux loss chỉ lúc train) — củng cố đóng góp
#    category/taxonomy của CatSA cho bài Q3.
# 2. use_repeat_boost (RepeatNet-style): bias học được cho item đã xuất hiện
#    trong prefix. Protocol không mask repeat item + dữ liệu giữ duplicate
#    liên tiếp → P(next ∈ prefix) cao (bằng chứng: ensemble_eval phase 1,
#    delta=2 cố định đưa len_gate 0.3702 → 0.3806 test mrr@20).
#
# Nền: catsa_plus_v2_len_gate (bản đơn tốt nhất, Test mrr@20=0.3702) — giữ
# nguyên Module 1 + Module 2 + InfoNCE + mọi hyperparameter.
#
# Chạy: python CatSA/main.py --run baseline/catsa_plus_v3_full.yaml
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: CatSA/baseline/CatSA_plus_v3_full.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 2
  use_taxonomy: true
  dropout: 0.1
  encoder_type: catsa_plus_v2
  fusion_type: gate
  n_heads: 2
  retrieval_topk: 5
  max_seq_length: 50
  trm_layers: 2
  trm_inner_size: 256
  temperature: 0.07
  sess_dropout: 0.2
  item_dropout: 0.2
  trm_dropout: 0.5
  use_seq_trm: true
  use_module1: true
  path_fusion: dual_score
  dual_score_beta: 1.0
  learn_score_beta: true
  use_cat_bias: false
  extra_rerank: false
  length_aware_gate: true
  length_gate_max_len: 50
  use_multi_interest: true
  n_interests: 4
  use_cat_intent: true
  cat_intent_beta: 0.3
  cat_intent_layers: 1
  use_repeat_boost: false
  repeat_boost_init: 2.0

augment:
  strategies: [same, sibling, hybrid]
  strategy_weights: [0.4, 0.3, 0.3]
  eta_aug: 0.3
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: true
  cl_type: both
  lambda_cl: 0.05
  lambda_proto: 0.05
  aux_cat: true
  aux_parent: false
  lambda_aux_cat: 0.05
  lambda_aux_parent: 0.0
  tau: 0.2
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 30
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/CatSA/retailrocket/catsa_plus_v3_full"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
