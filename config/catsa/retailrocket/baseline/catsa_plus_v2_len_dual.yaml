# CatSA++ length-adaptive — eval kết hợp short + long (routing len(prefix) <= 5)
# Chạy sau khi train short và long:
#   python CatSA/main.py --run baseline/catsa_plus_v2_len_dual.yaml
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: CatSA/baseline/CatSA_plus_v2_len_dual.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 2
  use_taxonomy: true
  dropout: 0.1
  encoder_type: catsa_plus_v2
  fusion_type: gate
  n_heads: 2
  retrieval_topk: 5
  max_seq_length: 50
  trm_layers: 2
  trm_inner_size: 256
  temperature: 0.07
  sess_dropout: 0.2
  item_dropout: 0.2
  trm_dropout: 0.5
  use_seq_trm: true
  use_module1: true
  path_fusion: dual_score
  dual_score_beta: 1.0
  learn_score_beta: true
  use_cat_bias: false
  extra_rerank: false

augment:
  strategies: [same, sibling, hybrid]
  strategy_weights: [0.4, 0.3, 0.3]
  eta_aug: 0.3
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: false
  cl_type: infonce
  lambda_cl: 0.0
  lambda_proto: 0.0
  aux_cat: false
  aux_parent: false
  lambda_aux_cat: 0.0
  lambda_aux_parent: 0.0
  tau: 0.2
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 0
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints

evaluation:
  mode: length_dual
  length_threshold: 5
  checkpoint_short: checkpoints/CatSA/retailrocket/catsa_plus_v2_len_short/best_model.pt
  checkpoint_long: checkpoints/CatSA/retailrocket/catsa_plus_v2_len_long/best_model.pt
  top_k: [10, 20]
  primary_metric: mrr@20
