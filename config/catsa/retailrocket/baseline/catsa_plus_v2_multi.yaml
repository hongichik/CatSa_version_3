# CatSA++ multi-interest readout (ComiRec/Atten-Mixer style) — thay
# SoftAttentionReadout (1 vector) của nhánh sequential bằng K=4 interest
# head pool song song rồi gộp 2 tầng (item-level → interest-level).
#
# Bối cảnh: 3 lần trước (proto 0.3700, len_gate 0.3704, star 0.3696, reg
# 0.3641) cho thấy: (a) regularization nhẹ → overfit sớm ~0.37; (b)
# regularization mạnh → underfit ~0.364; (c) thêm branch mới (star node) →
# tệ hơn. Kết luận: trần hiệu năng nằm ở CÁCH mô hình tổng hợp thông tin
# phiên, không phải thiếu/thừa regularization. Multi-interest readout thử
# hướng khác: đổi CÁCH pool thay vì thêm nhánh — ít tham số hơn star node.
#
# Giữ nguyên Module 1 (sequential+membership+taxonomy) + Module 2 +
# Session-level InfoNCE + length_aware_gate + regularization GỐC của
# len_gate (dropout 0.1/0.2/0.2, weight_decay 1e-5 — không lặp lại sai lầm
# của catsa_plus_v2_reg).
#
# Chạy: python CatSA/main.py --run baseline/catsa_plus_v2_multi.yaml
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: CatSA/baseline/CatSA_plus_v2_multi.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 2
  use_taxonomy: true
  dropout: 0.1
  encoder_type: catsa_plus_v2
  fusion_type: gate
  n_heads: 2
  retrieval_topk: 5
  max_seq_length: 50
  trm_layers: 2
  trm_inner_size: 256
  temperature: 0.07
  sess_dropout: 0.2
  item_dropout: 0.2
  trm_dropout: 0.5
  use_seq_trm: true
  use_module1: true
  path_fusion: dual_score
  dual_score_beta: 1.0
  learn_score_beta: true
  use_cat_bias: false
  extra_rerank: false
  length_aware_gate: true
  length_gate_max_len: 50
  use_star_node: false
  use_multi_interest: true
  n_interests: 4

augment:
  strategies: [same, sibling, hybrid]
  strategy_weights: [0.4, 0.3, 0.3]
  eta_aug: 0.3
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: true
  cl_type: both
  lambda_cl: 0.05
  lambda_proto: 0.05
  aux_cat: true
  aux_parent: false
  lambda_aux_cat: 0.05
  lambda_aux_parent: 0.0
  tau: 0.2
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 30
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/CatSA/retailrocket/catsa_plus_v2_multi"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
