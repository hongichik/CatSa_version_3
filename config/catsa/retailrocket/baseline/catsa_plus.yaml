# CatSA+ — giữ đóng góp Q3 (May26) + scoring ổn định để MRR@20 > 0.39
#
# Đóng góp CatSA (theo Xây dựng_CatSA_May26.pdf) — KHÔNG bị thay bằng CORE:
#   Module 1 — dual-path hetero graph (seq + membership + taxonomy)  ← encoder chính
#   Module 2 — same / sibling / hybrid augmentation                  ← bên dưới
#   Session-level InfoNCE                                             ← use_cl
#
# Chỉ mượn từ repo (không phải contribution claim):
#   - TransNet phụ trên CÙNG item emb (nhánh tuần tự phụ, gated với Module 1)
#   - L2-normalize + temperature scoring (geometry ranking)
#
# Ablation Q3 vẫn làm được:
#   A2 = use_cl: false  (Module 1 only)
#   Full = file này
#
# Chạy: python CatSA/main.py --run baseline/catsa_plus.yaml
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: CatSA/baseline/CatSA_plus.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 2
  use_taxonomy: true
  dropout: 0.1                 # GNN Module 1
  encoder_type: catsa_plus
  fusion_type: gate              # fuse seq↔tax trong Module 1
  n_heads: 2
  retrieval_topk: 5
  max_seq_length: 50
  trm_layers: 2
  trm_inner_size: 256
  temperature: 0.07
  sess_dropout: 0.2
  item_dropout: 0.2
  trm_dropout: 0.5               # TransNet phụ (ổn định hơn 0.1)
  use_seq_trm: true
  extra_rerank: false

augment:
  strategies: [same, sibling, hybrid]
  strategy_weights: [0.4, 0.3, 0.3]
  eta_aug: 0.3
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: true                   # Module 2 + InfoNCE (CatSA đầy đủ)
  cl_type: infonce               # đúng Giai đoạn 6 proposal; proto/aux tuỳ ablation sau
  lambda_cl: 0.05
  lambda_proto: 0.0
  aux_cat: false
  aux_parent: false
  lambda_aux_cat: 0.0
  lambda_aux_parent: 0.0
  tau: 0.2
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 30
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/CatSA/retailrocket/catsa_plus"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
