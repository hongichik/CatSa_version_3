# ============================================================================
# Ví dụ: Dual-path encoder + prototype CL
# Chạy: python CatSA/main.py --run catsa_enc_dual_path.yaml
# ============================================================================

project:
  name: retailrocket
  filename_mode: custom
  custom_filename: CatSA/encoder/CatSA_enc_dual_path.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 2
  use_taxonomy: true
  dropout: 0.1
  encoder_type: dual_path
  fusion_type: cross_attn
  n_heads: 2
  retrieval_topk: 5

augment:
  strategies: [same, sibling, hybrid]
  strategy_weights: []
  eta_aug: 0.3
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: true
  cl_type: both
  lambda_cl: 0.1
  lambda_proto: 0.1
  aux_cat: true
  aux_parent: true
  lambda_aux_cat: 0.1
  lambda_aux_parent: 0.1
  tau: 0.5
  batch_size: 100
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 30
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: ""

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
