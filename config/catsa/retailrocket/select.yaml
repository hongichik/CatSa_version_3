# select.yaml — danh sách version CatSA cho RetailRocket
# Cây thư mục:
#   baseline/      — v1..v4 + v2_mg_core
#   sweep/         — hyperparam ablation (eta, dim, batch)
#   encoder/       — encoder ablation
#   ablation_len/  — filter độ dài phiên / category-only
#   research/      — mẫu research đầy đủ
#
# Cách chạy:
#   python CatSA/main.py                              → lần lượt mọi mục trong run:
#   python CatSA/main.py --run baseline/catsa_v1.yaml → một bản (đường dẫn tương đối)
#   python CatSA/main.py --run catsa_v1.yaml          → cũng OK (tìm theo basename)
#
# [2026-07-08] TẠM DỪNG sweep — chuyển sang cải thiện logic model.

