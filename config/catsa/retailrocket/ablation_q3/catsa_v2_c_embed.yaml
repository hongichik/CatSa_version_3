# So sánh fusion cũ (embed_gate) vs dual_score — cùng full CatSA
# Chạy: python CatSA/main.py --run ablation_q3/catsa_v2_c_embed.yaml
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: CatSA/ablation_q3/CatSA_v2_c_embed.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 2
  use_taxonomy: true
  dropout: 0.1
  encoder_type: catsa_plus_v2
  fusion_type: gate
  n_heads: 2
  retrieval_topk: 5
  max_seq_length: 50
  trm_layers: 2
  trm_inner_size: 256
  temperature: 0.07
  sess_dropout: 0.2
  item_dropout: 0.2
  trm_dropout: 0.5
  use_seq_trm: true
  use_module1: true
  path_fusion: embed_gate
  extra_rerank: false

augment:
  strategies: [same, sibling, hybrid]
  strategy_weights: [0.4, 0.3, 0.3]
  eta_aug: 0.3
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: true
  cl_type: infonce
  lambda_cl: 0.05
  lambda_proto: 0.0
  aux_cat: false
  aux_parent: false
  lambda_aux_cat: 0.0
  lambda_aux_parent: 0.0
  tau: 0.2
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 30
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/CatSA/retailrocket/catsa_v2_c_embed"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
