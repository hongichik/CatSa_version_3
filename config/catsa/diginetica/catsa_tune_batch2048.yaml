# CatSA A2 + batch 256 (song song tune_a2 batch 128) — align với CORE
project:
  name: CatSA_v1
  filename_mode: custom
  custom_filename: diginetica_tune_batch2048.log

data:
  data_dir: data/diginetica
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 1
  use_taxonomy: false
  dropout: 0.2

augment:
  strategies: [same]
  strategy_weights: []
  eta_aug: 0.2
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: false
  lambda_cl: 0.1
  tau: 0.5
  batch_size: 2048
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 50
  patience: 10
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/CatSA_v1/catsa_v1/diginetica_tune_batch2048"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
