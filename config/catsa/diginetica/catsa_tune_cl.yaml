# CatSA full CL nhẹ — batch lớn hơn, lambda_cl thấp, augment tối thiểu
project:
  name: diginetica
  filename_mode: custom
  custom_filename: diginetica_tune_cl.log

data:
  data_dir: data/diginetica
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 128
  num_layers: 1
  use_taxonomy: false
  dropout: 0.2

augment:
  strategies: [same]
  strategy_weights: []
  eta_aug: 0.2
  eta_crop: 0.75
  k_min: 3

training:
  use_cl: true
  lambda_cl: 0.01
  tau: 0.2
  batch_size: 128
  learning_rate: 0.0005
  weight_decay: 0.00001
  max_epochs: 50
  patience: 10
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/diginetica/catsa_v1/diginetica_tune_cl"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
