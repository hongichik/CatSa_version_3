# ============================================================================
# FILE CHỌN VERSION - danh sách cấu hình CatSA sẽ chạy
# ============================================================================
# run có thể là:
#   - MỘT file:  run: catsa_v1.yaml          → CatSA/main.py chạy 1 lần
#   - DANH SÁCH: run: [catsa_v1.yaml, ...]   → CatSA/main.py chạy LẦN LƯỢT từng file
#
# Chỉ chạy một cấu hình (bỏ qua list):
#   python CatSA/main.py --run catsa_2_5.yaml
#
# tienxuly/main.py không train CatSA — khi load config chung chỉ dùng phần tử
# đầu tiên trong list (dataset + preprocess).

run:
  # - catsa_v1.yaml              # item_hon_5 (baseline)
  - catsa_2_5.yaml
  - catsa_3_6.yaml
  - catsa_4_7.yaml
  - catsa_2_7.yaml
  - catsa_category.yaml
