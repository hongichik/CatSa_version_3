# Thử nghiệm: giống hệt catsa_plus_v2_len_gate.yaml, chỉ giảm learning_rate
# một nửa (0.001 -> 0.0005) để kiểm tra giả thuyết val mrr@20 dao động lên
# xuống (epoch 1-4: 0.2555/0.2549/0.2574/0.2564) là do LR hơi cao so với
# batch_size=1024 (ít bước cập nhật/epoch hơn so với batch_size=256 cũ).
#
# Chạy: python CatSA/main.py --suite yoochoose --run catsa_plus_v2_len_gate_lr_half.yaml
project:
  name: yoochoose
  filename_mode: custom
  custom_filename: CatSA_plus_v2_len_gate_lr_half.log

data:
  data_dir: data/yoochoose
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

model:
  embedding_dim: 100
  num_layers: 2
  use_taxonomy: false
  dropout: 0.1
  encoder_type: catsa_plus_v2
  fusion_type: gate
  n_heads: 2
  retrieval_topk: 5
  max_seq_length: 50
  trm_layers: 2
  trm_inner_size: 256
  temperature: 0.07
  sess_dropout: 0.2
  item_dropout: 0.2
  trm_dropout: 0.5
  use_seq_trm: true
  use_module1: true
  path_fusion: dual_score
  dual_score_beta: 1.0
  learn_score_beta: true
  use_cat_bias: false
  extra_rerank: false
  length_aware_gate: true
  length_gate_max_len: 50

augment:
  strategies: [same, sibling, hybrid]
  strategy_weights: [0.4, 0.3, 0.3]
  eta_aug: 0.3
  eta_crop: 0.75
  k_min: 5

training:
  use_cl: true
  cl_type: both
  lambda_cl: 0.05
  lambda_proto: 0.05
  aux_cat: true
  aux_parent: false
  lambda_aux_cat: 0.05
  lambda_aux_parent: 0.0
  tau: 0.2
  batch_size: 1024
  learning_rate: 0.0005
  weight_decay: 0.00001
  max_epochs: 30
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 2
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/CatSA/yoochoose/catsa_plus_v2_len_gate_lr_half"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
