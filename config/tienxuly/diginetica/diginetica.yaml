# diginetica — support>=5, giữ nguyên phiên, prefix≤50 (flat category, không taxonomy)
preprocess:
  output_dir: data/diginetica        # thư mục ghi train/val/test + lookup
  train_file: train.txt                           # file phiên train
  val_file: val.txt                               # file phiên validation
  test_file: test.txt                             # file phiên test
  lookup_file: lookup_tables.pkl                  # pickle item2cat, cat2items (cat_parent rỗng)
  event_types: [view]                             # không dùng với Diginetica (giữ cho đồng bộ schema)
  session_same_day: true                          # không dùng — phiên đã có sẵn theo sessionId
  session_gap_seconds: 1800                         # không dùng với Diginetica
  dedup_consecutive: false                          # false ≈ SR-GNN / benchmark chuẩn
  min_item_support: 5                             # item phải xuất hiện >= N lần mới được giữ
  min_session_length: 2                           # phiên ngắn hơn bị loại
  max_session_length: 50                          # chỉ dùng khi session_length_mode=filter
  session_length_mode: keep                       # keep=không cắt phiên; filter=lọc phiên theo [min,max]
  max_prefix_length: 50                           # giới hạn prefix lúc train/eval
  require_item_category: true                     # Diginetica: item phải có category
  val_ratio: 0.1                                  # tỉ lệ val (chia theo thời gian phiên)
  test_ratio: 0.1                                 # tỉ lệ test (chia theo thời gian phiên)
  max_sessions: 0                                 # 0=không giới hạn; >0=chỉ lấy N phiên đầu (smoke test)
