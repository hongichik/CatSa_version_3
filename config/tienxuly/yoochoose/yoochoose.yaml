# yoochoose — support>=5, giữ nguyên phiên, prefix≤50 (flat category, không taxonomy)
# Lưu ý benchmark: nhiều bài (SR-GNN/CORE) dùng yoochoose 1/64 (phần phiên GẦN NHẤT);
# bản này xử lý TOÀN BỘ — muốn 1/64 thì lọc sau hoặc chỉnh max_sessions.
preprocess:
  output_dir: data/yoochoose         # thư mục ghi train/val/test + lookup
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl
  event_types: [view]                # không dùng với YOOCHOOSE (chỉ có click)
  session_same_day: true             # không dùng — phiên đã có sẵn theo session_id
  session_gap_seconds: 1800          # không dùng với YOOCHOOSE
  dedup_consecutive: false           # false ≈ SR-GNN / benchmark chuẩn
  min_item_support: 5                # item phải xuất hiện >= N lần mới được giữ
  min_session_length: 2              # phiên ngắn hơn bị loại
  max_session_length: 50             # chỉ dùng khi session_length_mode=filter
  session_length_mode: keep          # keep=không cắt phiên
  max_prefix_length: 50              # giới hạn prefix lúc train/eval
  require_item_category: false       # nhiều item category "0" (không rõ) → gán UNK
  val_ratio: 0.1                     # chia theo thời gian phiên
  test_ratio: 0.1
  max_sessions: 0                    # 0=không giới hạn
