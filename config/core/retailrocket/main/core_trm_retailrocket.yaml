# CORE-trm trên RetailRocket item_hon_5
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: CORE/main/core_trm_retailrocket.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

core_model:
  type: trm
  embedding_size: 100
  inner_size: 256
  n_layers: 2
  n_heads: 2
  hidden_dropout_prob: 0.5
  attn_dropout_prob: 0.5
  hidden_act: gelu
  layer_norm_eps: 1.0e-12
  initializer_range: 0.02
  sess_dropout: 0.2
  item_dropout: 0.2
  temperature: 0.07
  max_seq_length: 50

core_training:
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 30
  patience: 5
  grad_clip: 5.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints
  save_dir: "checkpoints/CORE/retailrocket/core_trm"

evaluation:
  top_k: [10, 20]
  primary_metric: mrr@20
