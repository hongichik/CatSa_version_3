# LINK trên RetailRocket item_hon_5 (bản ĐẦY ĐỦ — |I|=79649)
# CẢNH BÁO: LINK dựng ma trận đặc (79649 × 79649) float32 ≈ 25GB/bản, cần nhiều bản
# + nghịch đảo ma trận ⇒ RẤT tốn RAM (dễ OOM với 62GB). Chỉ chạy khi máy đủ bộ nhớ.
project:
  name: retailrocket
  filename_mode: custom
  custom_filename: LINK/main/LINK_retailrocket_full.log

data:
  data_dir: data/retailrocket_item_hon_5
  train_file: train.txt
  val_file: val.txt
  test_file: test.txt
  lookup_file: lookup_tables.pkl

link:
  dataset_name: retailrocket_full
  reuse_converted: true
  reuse_teacher: true

  teacher_model: core_trm
  teacher_epochs: 20
  train_batch_size: 1024
  eval_batch_size: 512
  learning_rate: 0.001
  stopping_step: 5

  reg: 10.0
  reg_teacher: 100
  predict_weight: 4.0
  slis_alpha: 0.9
  teacher_normalize: true
  teacher_temperature: 0.1

  gpu_id: 0

evaluation:
  topk: [5, 10, 20]
  metrics: [Recall, MRR]
  valid_metric: MRR@20
